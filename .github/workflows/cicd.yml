name: DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: echo "No tests"

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app
          path: .

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t hello-app .

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy
        run: echo "K8 deploy step"